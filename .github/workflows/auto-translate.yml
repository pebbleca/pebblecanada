name: Auto-Translate FR

on:
  push:
    branches: [main]
    paths:
      - 'assets/js/lang.js'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Check for missing FR translations
        id: check
        run: |
          python tools/translate.py --dry-run 2>&1 | tee /tmp/translate-check.txt
          if grep -q "Nothing to do" /tmp/translate-check.txt; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Translate missing keys
        if: steps.check.outputs.needed == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python tools/translate.py

      - name: Commit translations
        if: steps.check.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/js/lang.js
          git diff --cached --quiet && exit 0
          git commit -m "Auto-translate: add missing FR translations"
          git push
