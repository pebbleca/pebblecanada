<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WCPT-351 Mock Exam — 3 Sets x 50 Questions</title>
<style>
  :root{
    --bg:#f6f7fb; --card:#ffffff; --ink:#1f2937; --muted:#6b7280;
    --line:#e5e7eb; --accent:#2563eb; --accent2:#1d4ed8;

  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);

    line-height:1.55;}
  .wrap{max-width:880px;margin:0 auto;padding:24px 20px 80px;}
  header.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
  header.top h1{font-size:22px;margin:0;letter-spacing:-0.01em;}
  header.top .meta{font-size:13px;color:var(--muted);}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;box-shadow:0 1px 2px rgba(0,0,0,0.03);}
  .card + .card{margin-top:16px;}
  h2{margin:0 0 8px;font-size:18px;}
  h3{margin:18px 0 8px;font-size:15px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
  p{margin:8px 0;}
  .btn{display:inline-block;background:var(--accent);color:#fff;border:none;border-radius:10px;
    padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;}
  .btn:hover{background:var(--accent2);}
  .btn.secondary{background:#eef2ff;color:var(--accent2);}
  .btn.secondary:hover{background:#e0e7ff;}
  .btn.ghost{background:transparent;color:var(--accent2);border:1px solid var(--line);}
  .btn:disabled{opacity:.5;cursor:not-allowed;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .pill{display:inline-block;background:#eef2ff;color:var(--accent2);font-size:12px;font-weight:600;
    padding:3px 10px;border-radius:999px;letter-spacing:.02em;}
  .pill.cat{background:#f1f5f9;color:#334155;}
  .progress{height:8px;background:#eef2ff;border-radius:999px;overflow:hidden;margin:8px 0 4px;}
  .progress > div{height:100%;background:var(--accent);transition:width .2s ease;}
  .passage{background:#fafbff;border:1px dashed #c7d2fe;border-radius:12px;padding:14px 16px;font-size:14.5px;}
  .passage .label{font-size:11px;color:var(--accent2);font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
  .passage p.para-body{margin:4px 0 12px;line-height:1.6;}
  .passage p.para-body:last-child{margin-bottom:4px;}
  .passage .snum{font-weight:600;color:#475569;}
  .passage .para-head{font-weight:700;color:#334155;margin:12px 0 2px;font-size:13.5px;}
  .passage .para-head:first-of-type{margin-top:8px;}
  .qstem{font-size:16px;margin:10px 0 12px;font-weight:500;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .opt{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border:1px solid var(--line);
    border-radius:10px;background:#fff;cursor:pointer;font-size:14.5px;}
  .opt:hover{background:#f9fafb;}
  .opt.selected{border-color:var(--accent);background:#eff6ff;}
  .opt.correct{border-color:var(--good);background:var(--good-bg);}
  .opt.wrong{border-color:var(--bad);background:var(--bad-bg);}
  .opt.disabled{cursor:default;}
  .opt .letter{font-weight:700;width:18px;flex-shrink:0;}
  .feedback{margin-top:12px;padding:12px 14px;border-radius:10px;font-size:14px;}
  .feedback.good{background:var(--good-bg);color:#14532d;border:1px solid #86efac;}
  .feedback.bad{background:var(--bad-bg);color:#7f1d1d;border:1px solid #fca5a5;}
  .feedback strong{display:block;margin-bottom:4px;}
  .nav{display:flex;justify-content:space-between;margin-top:18px;gap:10px;}
  .score-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-top:14px;}
  .score-box{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center;}
  .score-box .n{font-size:22px;font-weight:700;color:var(--accent2);}
  .score-box .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
  .summary-list{margin-top:14px;display:flex;flex-direction:column;gap:6px;}
  .summary-row{display:flex;justify-content:space-between;font-size:13.5px;padding:6px 10px;border-radius:8px;background:#f8fafc;}
  .summary-row.good{background:#f0fdf4;}
  .summary-row.bad{background:#fef2f2;}
  .set-card{display:flex;flex-direction:column;gap:8px;border:1px solid var(--line);border-radius:12px;padding:16px;background:#fff;}
  .set-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:10px;}
  .small{font-size:13px;color:var(--muted);}
  .legend{font-size:12px;color:var(--muted);margin-top:6px;}
  .ordered-clickable{display:flex;flex-direction:column;gap:6px;margin:10px 0;}
  .ordered-clickable .item{padding:8px 12px;border:1px solid var(--line);border-radius:8px;background:#fafafa;font-size:14px;}
  .kbd{background:#f1f5f9;border:1px solid var(--line);border-bottom-width:2px;border-radius:5px;padding:1px 6px;font-size:12px;}
  .timer{display:inline-flex;align-items:center;gap:6px;font-variant-numeric:tabular-nums;
    background:#eef2ff;color:var(--accent2);padding:6px 12px;border-radius:999px;font-weight:700;font-size:14px;}
  .timer.warn{background:#fef9c3;color:var(--warn);}
  .timer.danger{background:var(--bad-bg);color:var(--bad);animation:pulse 1s infinite;}
  .timer .dot{width:8px;height:8px;border-radius:50%;background:currentColor;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  .timeout-banner{background:var(--bad-bg);color:#7f1d1d;border:1px solid #fca5a5;
    border-radius:10px;padding:14px;margin-bottom:14px;font-size:14px;}
  @media (max-width:560px){.wrap{padding:16px 12px 60px;} .card{padding:18px;} h1{font-size:18px;}}
</style>
</head>

/* =========================================================================
   WCPT-351 Mock Exam — Self-contained interactive quiz
   Format mirrors the Government of Canada Written Communication Proficiency
   Test: 50 multiple-choice questions per set, mix of passage-based and
   standalone items covering grammar, punctuation, vocabulary, wordiness,
   register, main-idea/summary, sentence order, and paragraph order.
   ========================================================================= */

const CATEGORIES = {
  GRAMMAR:"Grammar",
  PUNCT:"Punctuation",
  VOCAB:"Vocabulary",
  WORDY:"Wordiness / Redundancy",
  REGISTER:"Level of Language",
  MAIN:"Main Idea / Summary",
  SENT:"Sentence Order",
  PARA:"Paragraph Order",
  SPELL:"Spelling"
};

/* -------------------------------------------------------------------------
   Helpers to build question objects compactly.
   q(category, stem, options, correctIndex, perOptionExplanations)
   options is array of strings.
   perOptionExplanations: array of strings, one per option, explaining why
   that option is right or wrong.
   ------------------------------------------------------------------------- */
function q(cat, stem, opts, correct, expl, passageRef){
  return {cat, stem, opts, correct, expl, passageRef:passageRef||null};
}

/* -------------------------------------------------------------------------
   Rebalance correct-answer positions.

   The hand-written question bank skews heavily toward B and A. Rather than
   re-author 450 questions, we deterministically permute each question's
   options (and their parallel explanations) so the correct answer lands at
   a target position drawn from a balanced sequence (each of A, B, C, D
   appears roughly 25% of the time across the 50 questions in each set).

   A small set of questions whose options or explanations reference option
   letters explicitly (e.g. "Both A and B are acceptable") are excluded
   from rebalancing to avoid breaking those references.
   ------------------------------------------------------------------------- */
function seededRng(seed){
  let s = seed >>> 0;
  return function(){
    // mulberry32 — small deterministic PRNG
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t>>>15), t | 1);
    t ^= t + Math.imul(t ^ (t>>>7), t | 61);
    return ((t ^ (t>>>14)) >>> 0) / 4294967296;
  };
}
function shuffleInPlace(arr, rng){
  for(let i=arr.length-1; i>0; i--){
    const j = Math.floor(rng()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
}
function rebalanceCorrect(set, skipIndices, seed){
  const rng = seededRng(seed);
  // Build a balanced target sequence: [0,1,2,3,0,1,2,3,...] of length = set.length
  const n = set.length;
  const targets = [];
  for(let i=0; i<n; i++) targets.push(i % 4);
  shuffleInPlace(targets, rng);

  for(let i=0; i<n; i++){
    if(skipIndices.has(i)) continue;
    const q = set[i];
    const desired = targets[i];
    const cur = q.correct;
    if(desired === cur) continue;
    // Swap the correct option's text + explanation with whatever is at the target position
    [q.opts[cur], q.opts[desired]] = [q.opts[desired], q.opts[cur]];
    [q.expl[cur], q.expl[desired]] = [q.expl[desired], q.expl[cur]];
    q.correct = desired;
  }
}

  2:  {name:"Set 2 — Cybersecurity & Service",            passages:["P2A","P2B","P2C","P2D","P2E"], questions:SET2},
  3:  {name:"Set 3 — Organizational Management",          passages:["P3A","P3B","P3C","P3D","P3E"], questions:SET3},
  4:  {name:"Set 4 — HR & Onboarding",                    passages:["P4A","P4B","P4C","P4D","P4E"], questions:SET4},
  5:  {name:"Set 5 — Public Services & Client Comms",     passages:["P5A","P5B","P5C","P5D","P5E"], questions:SET5},
  6:  {name:"Set 6 — Project Management & Reporting",     passages:["P6A","P6B","P6C","P6D","P6E"], questions:SET6},
  7:  {name:"Set 7 — Policy & Regulatory Affairs",        passages:["P7A","P7B","P7C","P7D","P7E"], questions:SET7},
  8:  {name:"Set 8 — Training & Development",             passages:["P8A","P8B","P8C","P8D","P8E"], questions:SET8},
  9:  {name:"Set 9 — Intergovernmental & International",  passages:["P9A","P9B","P9C","P9D","P9E"], questions:SET9},
  10: {name:"Set 10 — Communications & Public Affairs",   passages:["P10A","P10B","P10C","P10D","P10E"], questions:SET10},
  11: {name:"Set 11 — Financial Management & Procurement",passages:["P11A","P11B","P11C","P11D","P11E"], questions:SET11},
  12: {name:"Set 12 — Health & Safety",                   passages:["P12A","P12B","P12C","P12D","P12E"], questions:SET12},
  13: {name:"Set 13 — Research & Innovation",             passages:["P13A","P13B","P13C","P13D","P13E"], questions:SET13},
  14: {name:"Set 14 — Environmental & Sustainability",    passages:["P14A","P14B","P14C","P14D","P14E"], questions:SET14},
  15: {name:"Set 15 — Diversity, Equity & Inclusion",     passages:["P15A","P15B","P15C","P15D","P15E"], questions:SET15}
};

/* =========================================================================
   APP STATE & RENDERING
   ========================================================================= */
const app = document.getElementById("app");
const TIME_LIMIT_SECONDS = 90 * 60; // 90-minute exam window per set
let timerInterval = null;
let state = {
  view:"home",
  setId:null,
  qIndex:0,
  answers:[],     // {chosenIndex, correct}
  timeLeft:TIME_LIMIT_SECONDS,
  timeUp:false,
};

function formatTime(s){
  const m = Math.floor(s/60);
  const sec = s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function timerClass(s){
  if(s<=60) return "timer danger";
  if(s<=300) return "timer warn";
  return "timer";
}
function startTimer(){
  state.timeLeft = TIME_LIMIT_SECONDS;
  state.timeUp = false;
  stopTimer();
  timerInterval = setInterval(()=>{
    state.timeLeft = Math.max(0, state.timeLeft - 1);
    // Lightweight tick: just update timer chip and feedback area without full re-render.
    const el = document.getElementById("timer");
    if(el){
      el.className = timerClass(state.timeLeft);
      el.innerHTML = `<span class="dot"></span>Time remaining: ${formatTime(state.timeLeft)}`;
    }
    if(state.timeLeft<=0){
      state.timeUp = true;
      stopTimer();
      state.view = "results";
      render();
    }
  }, 1000);
}
function stopTimer(){
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
}

function render(){
  if(state.view==="home")    return renderHome();
  if(state.view==="quiz")    return renderQuiz();
  if(state.view==="results") return renderResults();
}

function renderHome(){
  app.innerHTML = `
    <header class="top">
      <h1>WCPT-351 Mock Exam</h1>
      <div class="meta">Written Communication Proficiency Test — practice format</div>
    </header>
    <section class="card">
      <h2>About this practice exam</h2>
      <p>This self-paced mock exam mirrors the structure of the Government of Canada
      <strong>Written Communication Proficiency Test (WCPT-351)</strong>: 50 multiple-choice
      questions per set covering grammar, punctuation, vocabulary, wordiness, level of
      language, main idea / summary, and sentence and paragraph order.</p>
      <p>You can take any of three independent sets. Click an answer to see immediate
      feedback. If your choice is wrong, you'll see why — and what the correct answer is —
      so each question doubles as a study moment.</p>
      <div class="legend">Tip: real WCPT-351 timing is roughly <strong>2 minutes per question</strong> (50 questions in 1h40m).</div>
    </section>
    <section class="card">
      <h2>Choose a set</h2>
      <p class="small">Each set is timed: <strong>90 minutes</strong> from the moment you start. The timer is visible at all times and turns yellow under 5 minutes and red under 1 minute. At 0:00 the test locks automatically and your results are shown.</p>
      <div class="set-grid">
        ${Object.keys(SETS).map(id=>`
          <div class="set-card">
            <div class="row" style="justify-content:space-between;align-items:center;">
              <strong>Set ${id}</strong>
              <span class="pill">50 questions · 90 min</span>
            </div>
            <div class="small">${SETS[id].name}</div>
            <button class="btn" onclick="startSet(${id})">Start Set ${id}</button>
          </div>
        `).join("")}
      </div>
    </section>
    <section class="card">
      <h2>Scoring categories</h2>
      <p class="small">Each question is tagged with one of:
      ${Object.values(CATEGORIES).map(c=>`<span class="pill cat" style="margin:2px;">${c}</span>`).join(" ")}</p>
    </section>
  `;
}

function startSet(id){
  state.view = "quiz";
  state.setId = id;
  state.qIndex = 0;
  state.answers = new Array(SETS[id].questions.length).fill(null);
  startTimer();
  render();
}

function renderQuiz(){
  const set = SETS[state.setId];
  const idx = state.qIndex;
  const total = set.questions.length;
  const item = set.questions[idx];
  const ans = state.answers[idx];
  const locked = state.timeUp;

  const passageHTML = item.passageRef && PASSAGES[item.passageRef] ? renderPassage(PASSAGES[item.passageRef]) : "";
  const progressPct = Math.round(((idx) / total) * 100);

  app.innerHTML = `
    <header class="top">
      <div>
        <h1 style="margin-bottom:4px;">WCPT-351 Mock Exam — Set ${state.setId}</h1>
        <div class="meta">Question ${idx+1} of ${total} &nbsp;·&nbsp; 90-minute time limit</div>
      </div>
      <span id="timer" class="${timerClass(state.timeLeft)}"><span class="dot"></span>Time remaining: ${formatTime(state.timeLeft)}</span>
    </header>
    ${locked ? `<div class="timeout-banner"><strong>Time's up.</strong> The 90-minute window has closed; no further answers can be submitted. Your results are below.</div>` : ""}
    <section class="card">
      <div class="row" style="justify-content:space-between;align-items:center;">
        <span class="pill cat">${item.cat}</span>
        <span class="small">Score so far: ${countCorrect()}/${idx + (ans?1:0)}</span>
      </div>
      <div class="progress"><div style="width:${progressPct}%"></div></div>
      ${passageHTML}
      <div class="qstem">${item.stem}</div>
      <div class="options" id="options">
        ${item.opts.map((opt,i)=>{
          let cls = "opt";
          const isLocked = ans || locked;
          if(isLocked) cls += " disabled";
          if(ans){
            if(i===item.correct) cls += " correct";
            else if(i===ans.chosenIndex) cls += " wrong";
          }
          const letter = String.fromCharCode(65+i);
          const click = (ans || locked) ? "" : `choose(${i})`;
          return `<div class="${cls}" onclick="${click}">
            <span class="letter">${letter}.</span><span>${opt}</span>
          </div>`;
        }).join("")}
      </div>
      ${ans ? renderFeedback(item, ans) : (locked ? `<div class="feedback bad"><strong>No answer recorded.</strong>The time limit was reached before you answered this question.</div>` : "")}
      <div class="nav">
        <button class="btn ghost" onclick="goHome()">Exit to home</button>
        <div class="row">
          <button class="btn secondary" ${idx===0?"disabled":""} onclick="prev()">Previous</button>
          ${locked
            ? `<button class="btn" onclick="finish()">See results</button>`
            : (ans
                ? (idx===total-1
                    ? `<button class="btn" onclick="finish()">See results</button>`
                    : `<button class="btn" onclick="next()">Next question</button>`)
                : `<button class="btn" disabled>Select an answer</button>`)}
        </div>
      </div>
    </section>
  `;
}

function renderPassage(p){
  // Two supported shapes:
  //   { title, sentences:[...] }                      — flat list (legacy)
  //   { title, paragraphs:[{label,text:[...]}, ...] } — labeled paragraphs (authentic WCPT format)
  // Sentences are rendered inline within a paragraph, each prefixed by (N)
  // where N is the sentence number — mirroring the format on the actual test.
  if(p.paragraphs && p.paragraphs.length){
    let counter = 1;
    const blocks = p.paragraphs.map(para=>{
      const inline = para.text.map((s,i)=>`<span class="snum">(${counter+i})</span>${s}`).join(" ");
      const html = `<div class="para-head">Paragraph ${para.label}</div><p class="para-body">${inline}</p>`;
      counter += para.text.length;
      return html;
    }).join("");
    return `<div class="passage"><div class="label">${p.title}</div>${blocks}</div>`;
  }
  // Legacy flat-sentence passage: render as a single continuous paragraph with inline numbering.
  const inline = p.sentences.map((s,i)=>`<span class="snum">(${i+1})</span>${s}`).join(" ");
  return `<div class="passage">
    <div class="label">${p.title}</div>
    <p class="para-body">${inline}</p>
  </div>`;
}

function renderFeedback(item, ans){
  const isCorrect = ans.chosenIndex === item.correct;
  const expl = item.expl[ans.chosenIndex] || "";
  const correctLetter = String.fromCharCode(65 + item.correct);
  const correctText = item.opts[item.correct];
  if(isCorrect){
    return `<div class="feedback good">
      <strong>Correct.</strong>${expl}
    </div>`;
  }
  return `<div class="feedback bad">
    <strong>Not quite.</strong>
    ${expl}
    <div style="margin-top:8px;"><strong>Correct answer: ${correctLetter}.</strong> ${correctText}<br>
    <em>${item.expl[item.correct]}</em></div>
  </div>`;
}

function choose(i){
  if(state.timeUp) return;
  const set = SETS[state.setId];
  const item = set.questions[state.qIndex];
  state.answers[state.qIndex] = {
    chosenIndex:i,
    correct: i===item.correct
  };
  render();
}

function countCorrect(){
  return state.answers.filter(a=>a && a.correct).length;
}

function prev(){
  if(state.qIndex>0){ state.qIndex--; render(); }
}
function next(){
  const set = SETS[state.setId];
  if(state.qIndex < set.questions.length-1){ state.qIndex++; render(); }
}
function finish(){
  stopTimer();
  state.view = "results"; render();
}
function goHome(){
  stopTimer();
  state.view = "home"; state.setId=null; state.qIndex=0; state.answers=[];
  state.timeLeft = TIME_LIMIT_SECONDS; state.timeUp = false;
  render();
}

function renderResults(){
  stopTimer();
  const set = SETS[state.setId];
  const total = set.questions.length;
  const correct = countCorrect();
  const answered = state.answers.filter(a=>a!==null).length;
  const pct = Math.round((correct/total)*100);
  const timeUsed = TIME_LIMIT_SECONDS - state.timeLeft;

  // category breakdown
  const byCat = {};
  Object.values(CATEGORIES).forEach(c=>byCat[c]={total:0,correct:0});
  set.questions.forEach((q,i)=>{
    byCat[q.cat].total++;
    if(state.answers[i] && state.answers[i].correct) byCat[q.cat].correct++;
  });

  app.innerHTML = `
    <header class="top">
      <h1>WCPT-351 Mock Exam — Set ${state.setId} Results</h1>
    </header>
    ${state.timeUp ? `<div class="timeout-banner"><strong>Time's up.</strong> The 90-minute window has closed.</div>` : ""}
    <section class="card">
      <h2>Your score</h2>
      <div class="score-grid">
        <div class="score-box"><div class="n">${correct}/${total}</div><div class="l">Correct</div></div>
        <div class="score-box"><div class="n">${pct}%</div><div class="l">Overall</div></div>
        <div class="score-box"><div class="n">${answered}/${total}</div><div class="l">Answered</div></div>
        <div class="score-box"><div class="n">${formatTime(timeUsed)}</div><div class="l">Time used</div></div>
      </div>
    </section>
    <section class="card">
      <h2>By category</h2>
      <div class="summary-list">
        ${Object.entries(byCat).map(([cat,v])=>{
          const p = v.total>0 ? Math.round((v.correct/v.total)*100) : 0;
          const cls = p>=70 ? "good" : (p<50 ? "bad" : "");
          return `<div class="summary-row ${cls}">
            <span>${cat}</span>
            <span><strong>${v.correct}/${v.total}</strong> &nbsp; (${p}%)</span>
          </div>`;
        }).join("")}
      </div>
    </section>
    <section class="card">
      <h2>Next steps</h2>
      <div class="row">
        <button class="btn" onclick="retrySet()">Retry Set ${state.setId}</button>
        ${SETS[state.setId+1]?`<button class="btn secondary" onclick="startSet(${state.setId+1})">Continue to Set ${state.setId+1}</button>`:""}
        <button class="btn ghost" onclick="goHome()">Back to home</button>
      </div>
    </section>
  `;
}
function retrySet(){
  startSet(state.setId);
}

// expose handlers
window.startSet = startSet;
window.choose = choose;
window.prev = prev;
window.next = next;
window.finish = finish;
window.goHome = goHome;
window.retrySet = retrySet;

render();
</script>
</body>
</html>
