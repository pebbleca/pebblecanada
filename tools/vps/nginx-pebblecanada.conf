## Pebble Canada — Nginx server block
## Install to: /etc/nginx/sites-available/pebblecanada.ca
## Works behind Cloudflare (SSL terminated at edge)

server {
    listen 80;
    listen [::]:80;

    server_name pebblecanada.ca www.pebblecanada.ca;

    root /var/www/pebblecanada;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Only trust Cloudflare IPs for real visitor IP ─────────────────
    # (optional — uncomment after confirming Cloudflare is active)
    # set_real_ip_from 173.245.48.0/20;
    # set_real_ip_from 103.21.244.0/22;
    # set_real_ip_from 103.22.200.0/22;
    # set_real_ip_from 103.31.4.0/22;
    # set_real_ip_from 141.101.64.0/18;
    # set_real_ip_from 108.162.192.0/18;
    # set_real_ip_from 190.93.240.0/20;
    # set_real_ip_from 188.114.96.0/20;
    # set_real_ip_from 197.234.240.0/22;
    # set_real_ip_from 198.41.128.0/17;
    # set_real_ip_from 162.158.0.0/15;
    # set_real_ip_from 104.16.0.0/13;
    # set_real_ip_from 104.24.0.0/14;
    # set_real_ip_from 172.64.0.0/13;
    # set_real_ip_from 131.0.72.0/22;
    # real_ip_header CF-Connecting-IP;

    # ── Redirect www to non-www ──────────────────────────────────────
    if ($host = www.pebblecanada.ca) {
        return 301 $scheme://pebblecanada.ca$request_uri;
    }

    # ── Static site routing ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # ── Custom 404 ───────────────────────────────────────────────────
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # ── Cache static assets ──────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Gzip compression ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Block dotfiles ───────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ──────────────────────────────────────────────────────
    access_log /var/log/nginx/pebblecanada.access.log;
    error_log  /var/log/nginx/pebblecanada.error.log;
}
